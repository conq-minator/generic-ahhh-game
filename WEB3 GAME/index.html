<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boss Hunting RPG</title>
  <meta name="description" content="A 3D browser-based Boss Hunting RPG where players explore caves, defeat bosses, and mint gear as NFTs." />
  <link rel="stylesheet" href="./src/styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/": "https://cdn.jsdelivr.net/npm/three@0.162.0/",
      "ethers": "https://cdn.jsdelivr.net/npm/ethers@6.11.0/dist/ethers.min.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- Start Screen -->
  <div id="start-screen">
    <div class="start-content">
      <h1>BOSS HUNTER</h1>
      <p class="subtitle">Explore • Fight • Collect</p>
      <button id="start-btn">START GAME</button>
      <button id="connect-wallet-btn">🦊 Connect Wallet</button>
      <p class="instructions">WASD — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; Click — Attack &nbsp;|&nbsp; Space — Dodge</p>
    </div>
  </div>

  <!-- HUD Overlay -->
  <div id="hud" class="hidden">
    <!-- Player Health -->
    <div id="player-hud">
      <div class="player-health-label">HP</div>
      <div class="health-bar-container">
        <div id="player-health-bar" class="health-bar-fill"></div>
      </div>
      <span id="player-health-text">100 / 100</span>
    </div>

    <!-- Equipped Sword -->
    <div id="sword-indicator" class="hidden">
      <span id="sword-name">No Sword</span>
    </div>

    <!-- Crosshair -->
    <div id="crosshair">+</div>

    <!-- Boss Health Bar -->
    <div id="boss-hud" class="hidden">
      <div id="boss-name">BOSS</div>
      <div class="boss-health-container">
        <div id="boss-health-bar" class="health-bar-fill"></div>
      </div>
    </div>

    <!-- Notifications -->
    <div id="notification-container"></div>

    <!-- Inventory Hint -->
    <div id="inventory-hint">
      <div id="gear-slots"></div>
    </div>

    <!-- Minimap -->
    <canvas id="minimap" width="160" height="160"></canvas>
  </div>

  <!-- Loot Panel -->
  <div id="loot-panel" class="hidden">
    <div class="loot-content">
      <h2>⚔️ BOSS DEFEATED!</h2>
      <div id="loot-icon"></div>
      <div id="loot-name"></div>
      <div id="loot-rarity"></div>
      <div id="loot-description"></div>
      <button id="mint-nft-btn">🔗 Mint as NFT</button>
      <button id="continue-btn">Continue Playing</button>
    </div>
  </div>

  <!-- Death Screen -->
  <div id="death-screen" class="hidden">
    <div class="death-content">
      <h2>💀 YOU DIED</h2>
      <p>Prepare yourself and try again.</p>
      <button id="respawn-btn">Respawn</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>

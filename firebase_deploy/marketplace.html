<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Marketplace | Web3 RPG</title>
    <style>
        body {
            background-color: #050510;
            color: #ff00ff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 0, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ff00ff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }
        h2 {
            letter-spacing: 4px;
            font-weight: 300;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Redirect to the marketplace interface
        setTimeout(() => {
            window.location.replace("/WEB3%20GAME%20-%20Copy/CharityBlockchainProject/frontend/index.html");
        }, 1500);
    </script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>CONNECTING TO MARKETPLACE...</h2>
    </div>
</body>
</html>
